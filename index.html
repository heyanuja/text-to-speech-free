<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>text to speech</title>
  <style>
    :root {
      --cream: #f4ead4;
      --paper: #ffffff;
      --ink: #1a1612;
      --oxblood: #6a1f1f;
      --rule: rgba(26, 22, 18, 0.18);
    }
    * { box-sizing: border-box; }
    html, body { background: var(--cream); margin: 0; }
    body {
      color: var(--ink);
      font-family: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
      font-size: 18px;
      line-height: 1.6;
      padding: 4rem 1.5rem 5rem;
      min-height: 100vh;
    }

    .card {
      background: var(--paper);
      border: 1.5px solid var(--ink);
      max-width: 720px;
      margin: 0 auto;
      padding: 3.5rem 2.5rem 2.5rem;
      position: relative;
      box-shadow: 6px 6px 0 var(--ink);
    }

    .ribbon {
      background: var(--ink);
      color: var(--paper);
      display: inline-block;
    }
    h1.ribbon {
      position: absolute;
      top: -1.4rem;
      left: 50%;
      transform: translateX(-50%);
      padding: 0.55rem 2.6rem;
      font-family: "Didot", "Bodoni 72", "Bodoni Moda", Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: 1.6rem;
      letter-spacing: 0.04em;
      white-space: nowrap;
      margin: 0;
      clip-path: polygon(0 0, 100% 0, 96% 50%, 100% 100%, 0 100%, 4% 50%);
    }
    .tagline {
      text-align: center;
      color: var(--oxblood);
      font-style: italic;
      font-size: 0.95rem;
      margin: 0 0 2rem;
      letter-spacing: 0.02em;
    }

    textarea {
      width: 100%;
      min-height: 300px;
      background: var(--paper);
      border: 1.5px dashed var(--ink);
      padding: 1rem 1.1rem;
      font: inherit;
      color: var(--ink);
      resize: vertical;
      outline: none;
    }
    textarea:focus { border-style: solid; }
    textarea::placeholder { color: rgba(26, 22, 18, 0.4); font-style: italic; }

    #reader {
      white-space: pre-wrap;
      line-height: 1.75;
      font-size: 1.1rem;
      min-height: 60vh;
      padding: 0.5rem 0;
    }
    #reader .word {
      scroll-margin-top: 38vh;
      scroll-margin-bottom: 38vh;
      cursor: pointer;
      padding: 1px 2px;
      border-radius: 2px;
      transition: background 80ms;
    }
    #reader .word:hover { background: rgba(106, 31, 31, 0.10); }
    #reader .word.current {
      background: var(--oxblood);
      color: var(--paper);
    }
    [hidden] { display: none !important; }

    .controls {
      display: flex;
      gap: 0.7rem;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1.5px dashed var(--ink);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.92rem;
    }

    button {
      background: var(--paper);
      border: 1.5px solid var(--ink);
      color: var(--ink);
      padding: 0.45rem 1.1rem;
      font: inherit;
      cursor: pointer;
      letter-spacing: 0.02em;
      box-shadow: 3px 3px 0 var(--ink);
      transition: transform 80ms, box-shadow 80ms, background 80ms;
    }
    button:hover:not(:disabled) {
      transform: translate(1px, 1px);
      box-shadow: 2px 2px 0 var(--ink);
      background: var(--cream);
    }
    button:active:not(:disabled) {
      transform: translate(3px, 3px);
      box-shadow: none;
    }
    button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      box-shadow: 1px 1px 0 var(--ink);
    }
    #play {
      background: var(--oxblood);
      color: var(--paper);
    }
    #play:hover:not(:disabled) {
      background: var(--ink);
      color: var(--paper);
    }

    select {
      background: var(--paper);
      border: 1.5px solid var(--ink);
      color: var(--ink);
      padding: 0.4rem 0.55rem;
      font: inherit;
      max-width: 220px;
      box-shadow: 3px 3px 0 var(--ink);
      cursor: pointer;
    }
    label {
      display: inline-flex;
      gap: 0.5rem;
      align-items: center;
      color: var(--ink);
    }
    input[type="range"] {
      width: 110px;
      accent-color: var(--oxblood);
    }
    .rate-num { font-variant-numeric: tabular-nums; min-width: 2.4em; }

    @media (max-width: 600px) {
      body { padding: 3rem 0.75rem 4rem; font-size: 16px; }
      .card { padding: 3rem 1.25rem 1.5rem; box-shadow: 4px 4px 0 var(--ink); }
      h1.ribbon { font-size: 1.2rem; padding: 0.4rem 1.6rem; top: -1.05rem; }
      textarea { min-height: 240px; }
      #reader { font-size: 1rem; }
      .controls { gap: 0.5rem; }
      .controls > button { flex: 1 1 auto; }
      select { max-width: 100%; flex: 1 1 100%; }
      label { flex: 1 1 100%; justify-content: space-between; }
      input[type="range"] { flex: 1; width: auto; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 class="ribbon">text to speech</h1>
    <p class="tagline">#auditorylearnercore</p>

    <main>
      <textarea id="t" placeholder="paste anything in here."></textarea>
      <div id="reader" hidden></div>
      <div class="controls">
        <button id="play">play</button>
        <button id="pause" disabled>pause</button>
        <button id="stop" disabled>stop</button>
        <select id="voice"></select>
        <label>
          speed
          <input id="rate" type="range" min="0.5" max="4" step="0.1" value="1">
          <span class="rate-num" id="rd">1.0×</span>
        </label>
      </div>
    </main>
  </div>

  <script>
    const t = document.getElementById('t');
    const reader = document.getElementById('reader');
    const voiceEl = document.getElementById('voice');
    const rate = document.getElementById('rate');
    const rd = document.getElementById('rd');
    const play = document.getElementById('play');
    const pause = document.getElementById('pause');
    const stop = document.getElementById('stop');
    let voices = [];
    let wordSpans = [];
    let currentIdx = -1;
    let fullText = '';
    let wordOffsets = [];

    // mac doesnt put the (premium)/(enhanced) qualifier in v.name — its in voiceURI like
    // com.apple.voice.premium.en-US.Zoe. so check both.
    function quality(v) {
      const u = (v.voiceURI || '').toLowerCase();
      const n = v.name.toLowerCase();
      if (/premium/.test(u)  || /premium/.test(n))  return 'premium';
      if (/enhanced/.test(u) || /enhanced/.test(n)) return 'enhanced';
      if (/(natural|neural|google|siri)/.test(n))   return 'network';
      return null;
    }
    function rank(v) {
      const q = quality(v);
      if (q === 'premium') return 0;
      if (q === 'enhanced' || q === 'network') return 1;
      if (v.localService) return 2;
      return 3;
    }
    function label(v) {
      const q = quality(v);
      let pre = '', suf = '';
      if (q === 'premium')       { pre = '★ '; if (!/premium/i.test(v.name))  suf = ' (premium)'; }
      else if (q === 'enhanced') { pre = '◆ '; if (!/enhanced/i.test(v.name)) suf = ' (enhanced)'; }
      else if (q === 'network')  { pre = '◆ '; }
      return `${pre}${v.name} (${v.lang})${suf}`;
    }

    function loadVoices() {
      voices = speechSynthesis.getVoices().slice();
      voices.sort((a, b) => {
        const aEn = a.lang.startsWith('en') ? 0 : 1;
        const bEn = b.lang.startsWith('en') ? 0 : 1;
        if (aEn !== bEn) return aEn - bEn;
        const ra = rank(a), rb = rank(b);
        if (ra !== rb) return ra - rb;
        return a.name.localeCompare(b.name);
      });
      voiceEl.innerHTML = voices
        .map((v, i) => `<option value="${i}">${label(v)}</option>`)
        .join('');
    }
    loadVoices();
    speechSynthesis.onvoiceschanged = loadVoices;
    setTimeout(loadVoices, 200);

    rate.oninput = () => { rd.textContent = parseFloat(rate.value).toFixed(1) + '×'; };
    // web speech locks rate at speak-time, so on slider release: cancel + restart from the current word
    rate.onchange = () => {
      if (speechSynthesis.speaking && !speechSynthesis.paused && currentIdx >= 0) {
        speakFrom(currentIdx);
      }
    };

    function buildReader(text) {
      reader.innerHTML = '';
      wordSpans = [];
      wordOffsets = [];
      let pos = 0;
      const tokens = text.split(/(\s+)/);
      for (const tok of tokens) {
        if (!tok) continue;
        if (/^\s+$/.test(tok)) {
          reader.appendChild(document.createTextNode(tok));
        } else {
          const idx = wordSpans.length;
          const s = document.createElement('span');
          s.className = 'word';
          s.textContent = tok;
          s.onclick = () => speakFrom(idx);
          wordSpans.push(s);
          wordOffsets.push(pos);
          reader.appendChild(s);
        }
        pos += tok.length;
      }
    }

    function highlight(idx) {
      if (currentIdx >= 0 && wordSpans[currentIdx]) wordSpans[currentIdx].classList.remove('current');
      currentIdx = idx;
      if (wordSpans[idx]) {
        wordSpans[idx].classList.add('current');
        wordSpans[idx].scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }

    function setState(s) {
      if (s === 'idle')    { play.disabled = false; play.textContent = 'play';   pause.disabled = true;  stop.disabled = true;  t.hidden = false; reader.hidden = true;  }
      if (s === 'playing') { play.disabled = true;  play.textContent = 'play';   pause.disabled = false; stop.disabled = false; t.hidden = true;  reader.hidden = false; }
      if (s === 'paused')  { play.disabled = false; play.textContent = 'resume'; pause.disabled = true;  stop.disabled = false; }
    }

    function speakFrom(wordIdx) {
      speechSynthesis.cancel();
      const startOffset = wordOffsets[wordIdx] || 0;
      const slice = fullText.slice(startOffset);
      const u = new SpeechSynthesisUtterance(slice);
      const v = voices[voiceEl.value];
      if (v) u.voice = v;
      u.rate = parseFloat(rate.value);
      u.onboundary = (e) => {
        if (e.name !== 'word') return;
        const before = slice.slice(0, e.charIndex);
        const wordsBefore = (before.match(/\S+/g) || []).length;
        highlight(wordIdx + wordsBefore);
      };
      u.onend = () => { highlight(-1); setState('idle'); };
      speechSynthesis.speak(u);
      setState('playing');
    }

    play.onclick = () => {
      if (speechSynthesis.paused) { speechSynthesis.resume(); setState('playing'); return; }
      fullText = t.value;
      if (!fullText.trim()) return;
      buildReader(fullText);
      speakFrom(0);
    };

    pause.onclick = () => { speechSynthesis.pause(); setState('paused'); };
    stop.onclick  = () => { speechSynthesis.cancel(); highlight(-1); setState('idle'); };

    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'TEXTAREA') return;
      if (e.code === 'Space') {
        e.preventDefault();
        if (speechSynthesis.speaking && !speechSynthesis.paused) pause.click();
        else play.click();
      }
      if (e.code === 'Escape') { e.preventDefault(); stop.click(); }
    });
  </script>
</body>
</html>
